<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./responsivo450px.css">
    <link rel="stylesheet" href="./responsivo768px.css">
    <title>Paris 2024</title>
</head>
<body>

    <header class="logo">
        <a class="link" href="https://olympics.com/pt/olympic-games/paris-2024"><img  class="logo__jogos" src="./imagens/jogos.png" alt="Logo Jogos Olímpicos"></a>
    </header>

    <h1 class="titulo">Jogos Olímpicos de Paris 2024</h1>

    <div class="container">
        <div class="texto" >
            <p class="item" id="dias">0</p>
            <span class="texto__item">Dias</span>
        </div>

        <div class="texto" >
            <p class="item" id="horas">0</p>
            <span class="texto__item">Horas</span>
        </div>

        <div class="texto" >
            <p class="item" id="minutos">0</p>
            <span class="texto__item">Minutos</span>
        </div>

        <div class="texto" >
            <p class="item" id="segundos">0</p>
            <span class="texto__item">Segundos</span>
        </div>
    </div>

        <div class="esportes">
            <ul class="icones__esportes">
                <li class="icone__futebol"><a href="https://olympics.com/pt/esportes/futebol/"><img src="./imagens/futebol.png" alt="Futebol"></a></li>

                <li class="icone__ciclismo"><a href="https://olympics.com/pt/esportes/ciclismo-de-pista/"><img src="./imagens/ciclismo.svg" alt="Ciclismo"></a></li>

                <li class="icone__atletismo"><a href="https://olympics.com/pt/esportes/atletismo/"><img src="./imagens/atletismo.svg" alt="Atletismo"></a></li>

                <li class="icone__natacao"><a href="https://olympics.com/pt/esportes/natacao/"><img src="./imagens/natação.svg" alt="Natação"></a></li>

                <li class="icone__peso"><a href="https://olympics.com/pt/esportes/levantamento-de-peso/"><img src="./imagens/peso.svg" alt="Peso"></a></li>

                <li class="icone__tenis"><a href="https://olympics.com/pt/esportes/tenis/"><img src="./imagens/tenis.svg" alt="Tênis"></a></li>
            </ul>
            <p class="mais__esportes"><a href="https://olympics.com/pt/olympic-games/paris-2024">Mais</a></p>
        </div> 
        
        <div class="mascote">
            <img class="logo__mascote" src="./imagens/mascote.png" alt="Mascote">
        </div>
</body>


<footer class="titulo__footer">Desenvolvido por Rúbia Ribeiro | 2023

        <li class="logos"><a href="https://www.linkedin.com/in/rubianribeiro03/"><img src="./imagens/linkedin.png" alt="Logo LinkedIn"></a></li>
